name: Setup and Build
description: Common setup steps for CI jobs (checkout, install dependencies, cache, and build)

inputs:
  github_token:
    description: 'GitHub token for package registry authentication'
    required: true

runs:
  using: composite
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6.0.6

    - name: Install Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: .nvmrc
        cache: pnpm

    - name: Authenticate GitHub Package Registry
      run: echo "//npm.pkg.github.com/:_authToken=$GH_TOKEN" >> ~/.npmrc
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}

    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      shell: bash

    - name: Cache Turbo
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        key: ${{ runner.os }}-turbo-${{ hashFiles('**/turbo.json', '**/pnpm-lock.yaml') }}
        restore-keys: ${{ runner.os }}-turbo-
        path: .turbo

