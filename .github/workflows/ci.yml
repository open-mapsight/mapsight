name: CI
on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, synchronize]
    branches: ["main"]

env:
  TURBO_TELEMETRY_DISABLED: "1"
  TURBO_SCM_BASE: main
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  EVENT_NAME: ${{ github.event_name }}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  classify-ci:
    name: Classify CI paths
    timeout-minutes: 2
    runs-on: ubuntu-latest
    outputs:
      starters_e2e: ${{ steps.paths.outputs.starters_e2e }}
      starters_copy_out: ${{ steps.paths.outputs.starters_copy_out }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: false
          fetch-depth: 0

      - name: Classify changed paths
        id: paths
        run: |
          # Push/main: keep full starter coverage.
          # PRs: e2e is the cheap monorepo mount smoke; copy-out is the expensive
          # "npm install from packed tarballs" check — gate it more tightly.
          if [[ "$EVENT_NAME" != "pull_request" ]]; then
            echo "starters_e2e=true" >> "$GITHUB_OUTPUT"
            echo "starters_copy_out=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          starters_e2e=false
          starters_copy_out=false
          while IFS= read -r file; do
            case "$file" in
              .github/workflows/ci.yml|.github/actions/*|.nvmrc|package.json|pnpm-workspace.yaml|turbo.json)
                starters_e2e=true
                starters_copy_out=true
                ;;
              pnpm-lock.yaml)
                # Workspace install / Playwright tooling — not copy-out's npm installs.
                starters_e2e=true
                ;;
              e2e/starters/*)
                starters_e2e=true
                ;;
              scripts/smoke-starter-copy-out.mts)
                starters_copy_out=true
                ;;
              scripts/sync-workspace-mapsight.mts)
                # Used by monorepo starter prebuilds (e2e) and by copy-out prep.
                starters_e2e=true
                starters_copy_out=true
                ;;
              starters/*)
                starters_e2e=true
                starters_copy_out=true
                ;;
              packages/core/*|packages/lib-js/*|packages/lib-ol/*|packages/lib-redux/*)
                starters_e2e=true
                starters_copy_out=true
                ;;
              packages/traffic-style/*|packages/ui/*|packages/vector-style-compiler/*|packages/vite-host-embed/*)
                starters_e2e=true
                starters_copy_out=true
                ;;
            esac

            if [[ "$starters_e2e" == "true" && "$starters_copy_out" == "true" ]]; then
              break
            fi
          done < <(git diff --name-only "$PR_BASE_SHA...$PR_HEAD_SHA")

          echo "starters_e2e=$starters_e2e" >> "$GITHUB_OUTPUT"
          echo "starters_copy_out=$starters_copy_out" >> "$GITHUB_OUTPUT"
        shell: bash
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}

  build:
    name: Build
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: false
          fetch-depth: 0 # we need the full history to get the correct list of changed files

      - uses: ./.github/actions/setup/

      - name: Run build
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            pnpm run build --affected
          else
            pnpm run build
          fi
        shell: bash
        env:
          TURBO_FORCE: false

      - name: Ensure output directory exists
        run: mkdir -p dist && echo "keep" > dist/keep
        shell: bash

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-output
          path: |
            dist/keep
            apps/*/dist
            apps/*/src/generated
            apps/*/public/img/mapsight*
            starters/*/dist
            starters/*/src/generated
            starters/*/public/img/mapsight*
            starters/*/.next
            packages/*/dist
            packages/*/src/generated
            !node_modules
          retention-days: 1
          compression-level: 1
          include-hidden-files: true

  lint:
    name: Lint code
    timeout-minutes: 5
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: false
          fetch-depth: 0 # we need the full history to get the correct list of changed files

      - uses: ./.github/actions/setup/

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-output
          path: .

      - name: Lint
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            pnpm turbo run lint --only --affected
          else
            pnpm turbo run lint --only
          fi
        shell: bash

  lint-starters:
    name: Starter lint
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: false
          fetch-depth: 0 # we need the full history to get the correct list of changed files

      - uses: ./.github/actions/setup/

      - name: Lint starters
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            pnpm turbo run //#lint:starters --only --affected
          else
            pnpm turbo run //#lint:starters --only
          fi
        shell: bash

  check-format:
    name: Format
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: false
          fetch-depth: 0 # we need the full history to get the correct list of changed files

      - uses: ./.github/actions/setup/

      - name: Check formatting
        run: pnpm format:check

  typecheck:
    name: Typecheck
    timeout-minutes: 5
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: false
          fetch-depth: 0 # we need the full history to get the correct list of changed files

      - uses: ./.github/actions/setup/

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-output
          path: .

      - name: Run typechecks
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            pnpm run typecheck --only --affected
          else
            pnpm run typecheck --only
          fi
        shell: bash

  test:
    name: Tests
    timeout-minutes: 5
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: false
          fetch-depth: 0 # we need the full history to get the correct list of changed files

      - uses: ./.github/actions/setup/

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-output
          path: .

      - name: Run tests
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            pnpm run test --only --affected
          else
            pnpm run test --only
          fi
        shell: bash
        env:
          GITHUB_STEP_SUMMARY: /dev/null

  no-private-leak:
    name: No private leak
    timeout-minutes: 2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: false
          fetch-depth: 0 # setup action needs PR base SHA for turbo affected comparisons

      - uses: ./.github/actions/setup/

      - name: Check for private content on public branch
        run: pnpm run check:no-private-leak -- --mode workspace --visibility auto

  check:
    name: Repository checks
    timeout-minutes: 2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: false

      - uses: ./.github/actions/setup/

      - name: Run repository checks
        run: pnpm run check

  starters-e2e:
    name: Starters e2e
    timeout-minutes: 15
    runs-on: ubuntu-latest
    needs: [build, classify-ci]
    if: needs.classify-ci.outputs.starters_e2e == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: false

      - uses: ./.github/actions/setup/
        with:
          sync-main-ref: false

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-output
          path: .

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: |
          if [[ "$PLAYWRIGHT_CACHE_HIT" == "true" ]]; then
            pnpm exec playwright install chromium
          else
            pnpm exec playwright install --with-deps chromium
          fi
        shell: bash
        env:
          PLAYWRIGHT_CACHE_HIT: ${{ steps.playwright-cache.outputs.cache-hit }}

      - name: Build starter dependencies
        run: pnpm turbo run build --filter=mapsight-host-starter --filter=mapsight-next-starter --filter=mapsight-vite-spa-starter
        shell: bash

      - name: Run starter smoke tests
        run: pnpm run test:starters:e2e
        shell: bash

  starters-copy-out:
    name: Starters copy-out
    timeout-minutes: 20
    runs-on: ubuntu-latest
    needs: [build, classify-ci]
    if: needs.classify-ci.outputs.starters_copy_out == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: false

      - uses: ./.github/actions/setup/
        with:
          sync-main-ref: false

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-output
          path: .

      - name: Cache npm for copy-out starter installs
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.npm
          key: ${{ runner.os }}-starter-npm-${{ hashFiles('starters/*/package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-starter-npm-

      - name: Build starter dependencies
        run: pnpm turbo run build --filter=mapsight-host-starter --filter=mapsight-next-starter --filter=mapsight-vite-spa-starter
        shell: bash

      - name: Run copy-out starter smoke tests
        run: pnpm run test:starters:copy-out
        shell: bash

  lint-dependencies:
    name: Lint deps/pkg
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: false
          fetch-depth: 0 # we need the full history to get the correct list of changed files

      - uses: ./.github/actions/setup/

      - name: Check package.json format
        run: pnpm run syncpack:format:check

      - name: Lint dependencies
        run: pnpm run syncpack:lint

  zizmor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: false

      - name: Run zizmor 🌈
        uses: zizmorcore/zizmor-action@6599ee8b7a49aef6a770f63d261d214911a7ce02 # v0.6.0
        with:
          advanced-security: false

  check-changeset:
    name: Check changeset
    timeout-minutes: 5
    runs-on: ubuntu-latest
    # Changesets release PRs consume pending changesets into version and changelog updates.
    if: ${{ !(github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && startsWith(github.head_ref, 'changeset-release/')) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: false
          fetch-depth: 0 # we need the full history to get the correct list of changed files

      - uses: ./.github/actions/setup/

      - name: Check changeset
        run: node scripts/check-changeset-ci.mts
        shell: bash
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_USER: ${{ github.event.pull_request.user.login }}

  ci-pass:
    name: CI status
    timeout-minutes: 2
    runs-on: ubuntu-latest
    needs:
      [
        classify-ci,
        build,
        lint,
        lint-starters,
        check-format,
        typecheck,
        check,
        test,
        starters-e2e,
        starters-copy-out,
        lint-dependencies,
        no-private-leak,
        zizmor,
        check-changeset,
      ]
    if: always()
    steps:
      - name: Check CI status
        run: |
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "❌ One or more CI checks failed or were cancelled"
            exit 1
          fi
          echo "✅ All CI checks passed or were skipped"

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [ci-pass]

    # Skip on pull requests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment: production

    permissions:
      contents: write
      pull-requests: write
      id-token: write # Required for OIDC
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: true
          submodules: false
          fetch-depth: 0 # we need the full history to get the correct list of changed files

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          registry-url: "https://registry.npmjs.org"
          cache: ""
          package-manager-cache: false
          check-latest: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        shell: bash

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: pnpm run version-packages
          publish: npm run release
          commitMode: "github-api"
        env:
          NPM_TOKEN: "" # We use OIDC, not a token

      - name: Upload starter release artifacts
        if: steps.changesets.outputs.published == 'true'
        run: |
          mkdir -p dist/starter-downloads
          for starter in mapsight-host-starter mapsight-next-starter mapsight-vite-spa-starter; do
            git archive \
              --format=zip \
              --prefix="$starter/" \
              --output="dist/starter-downloads/$starter.zip" \
              HEAD:"starters/$starter"
          done

          node <<'NODE' > "$RUNNER_TEMP/published-tags"
          const packages = JSON.parse(process.env.PUBLISHED_PACKAGES || "[]");
          for (const {name, version} of packages) {
            console.log(`${name}@${version}`);
          }
          NODE

          while IFS= read -r tag; do
            if [[ -z "$tag" ]]; then
              continue
            fi

            gh release upload "$tag" dist/starter-downloads/*.zip --clobber
          done < "$RUNNER_TEMP/published-tags"
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
