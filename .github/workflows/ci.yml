name: CI
on:
  push:
    branches: [ "main" ]
  pull_request:
    types: [ opened, synchronize ]

env:
  TURBO_TELEMETRY_DISABLED: '1'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: false
          fetch-depth: 0 # we need the full history to get the correct list of changed files

      - uses: ./.github/actions/setup/
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run build
        run: pnpm run build --affected
        shell: bash
        env:
          TURBO_FORCE: false

      - name: Ensure output directory exists
        run: mkdir -p dist && echo "keep" > dist/keep
        shell: bash

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-output
          path: |
            dist/keep
            apps/*/dist
            apps/*/src/generated
            apps/*/public/img/mapsight*
            packages/*/dist
            packages/*/src/generated
            !node_modules
          retention-days: 1
          compression-level: 9

  lint:
    name: Lint code
    timeout-minutes: 5
    runs-on: ubuntu-latest
    needs: [ build ]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: false
          fetch-depth: 0 # we need the full history to get the correct list of changed files

      - uses: ./.github/actions/setup/
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-output
          path: .

      - name: Lint
        run: pnpm run lint --only --affected

  check-format:
    name: Format
    timeout-minutes: 5
    runs-on: ubuntu-latest
    needs: [ build ]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: false

      - uses: ./.github/actions/setup/
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-output
          path: .

      - name: Check formatting
        run: pnpm format:check

  typecheck:
    name: Typecheck
    timeout-minutes: 5
    runs-on: ubuntu-latest
    needs: [ build ]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: false
          fetch-depth: 0 # we need the full history to get the correct list of changed files

      - uses: ./.github/actions/setup/
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-output
          path: .

      - name: Run typechecks
        run: pnpm run typecheck --only --affected

  test:
    name: Tests
    timeout-minutes: 5
    runs-on: ubuntu-latest
    needs: [ build ]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: false
          fetch-depth: 0 # we need the full history to get the correct list of changed files

      - uses: ./.github/actions/setup/
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-output
          path: .

      - name: Run tests
        run: pnpm run test --only --affected

  lint-dependencies:
    name: Lint deps/pkg
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: false

      - uses: ./.github/actions/setup/
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check package.json format
        run: pnpm run syncpack:format:check

      - name: Lint dependencies
        run: pnpm run syncpack:lint

  zizmor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: false

      - name: Run zizmor 🌈
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          advanced-security: false

  check-changeset:
    name: Check changeset
    timeout-minutes: 5
    runs-on: ubuntu-latest
    needs: [ build ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: false

      - uses: ./.github/actions/setup/
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check changeset
        run: pnpm run check-changeset

  ci-pass:
    name: CI status
    timeout-minutes: 2
    runs-on: ubuntu-latest
    needs: [ build, lint, check-format, typecheck, test, lint-dependencies, zizmor, check-changeset ]
    if: always()
    steps:
      - name: Check CI status
        run: |
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "❌ One or more CI checks failed or were cancelled"
            exit 1
          fi
          echo "✅ All CI checks passed or were skipped"
