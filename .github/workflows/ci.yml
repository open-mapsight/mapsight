name: CI
on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, synchronize]
    branches: ["main"]

env:
  TURBO_TELEMETRY_DISABLED: "1"
  TURBO_SCM_BASE: main
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  EVENT_NAME: ${{ github.event_name }}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  classify-ci:
    name: Classify CI paths
    timeout-minutes: 2
    runs-on: ubuntu-latest
    outputs:
      starters_smoke: ${{ steps.paths.outputs.starters_smoke }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          submodules: false
          fetch-depth: 0

      - name: Classify changed paths
        id: paths
        run: |
          if [[ "$EVENT_NAME" != "pull_request" ]]; then
            echo "starters_smoke=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          starters_smoke=false
          while IFS= read -r file; do
            case "$file" in
              .github/workflows/ci.yml|.github/actions/*|.nvmrc|package.json|pnpm-lock.yaml|pnpm-workspace.yaml|turbo.json|configs/*)
                starters_smoke=true
                break
                ;;
              e2e/starters/*|scripts/smoke-starter-copy-out.mts|scripts/sync-workspace-mapsight.mts)
                starters_smoke=true
                break
                ;;
              starters/*|packages/core/*|packages/lib-js/*|packages/lib-ol/*|packages/lib-redux/*)
                starters_smoke=true
                break
                ;;
              packages/traffic-style/*|packages/ui/*|packages/vector-style-compiler/*|packages/vite-host-embed/*)
                starters_smoke=true
                break
                ;;
            esac
          done < <(git diff --name-only "$PR_BASE_SHA...$PR_HEAD_SHA")

          echo "starters_smoke=$starters_smoke" >> "$GITHUB_OUTPUT"
        shell: bash
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}

  build:
    name: Build
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          submodules: false
          fetch-depth: 0 # we need the full history to get the correct list of changed files

      - uses: ./.github/actions/setup/

      - name: Run build
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            pnpm run build --affected
          else
            pnpm run build
          fi
        shell: bash
        env:
          TURBO_FORCE: false

      - name: Ensure output directory exists
        run: mkdir -p dist && echo "keep" > dist/keep
        shell: bash

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-output
          path: |
            dist/keep
            apps/*/dist
            apps/*/src/generated
            apps/*/public/img/mapsight*
            starters/*/dist
            starters/*/src/generated
            starters/*/public/img/mapsight*
            starters/*/.next
            packages/*/dist
            packages/*/src/generated
            !node_modules
          retention-days: 1
          compression-level: 1
          include-hidden-files: true

  lint:
    name: Lint code
    timeout-minutes: 5
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          submodules: false
          fetch-depth: 0 # we need the full history to get the correct list of changed files

      - uses: ./.github/actions/setup/

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-output
          path: .

      - name: Lint
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            pnpm run lint --only --affected
          else
            pnpm run lint --only
          fi
        shell: bash

  check-format:
    name: Format
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          submodules: false
          fetch-depth: 0 # we need the full history to get the correct list of changed files

      - uses: ./.github/actions/setup/

      - name: Check formatting
        run: pnpm format:check

  typecheck:
    name: Typecheck
    timeout-minutes: 5
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          submodules: false
          fetch-depth: 0 # we need the full history to get the correct list of changed files

      - uses: ./.github/actions/setup/

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-output
          path: .

      - name: Run typechecks
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            pnpm run typecheck --only --affected
          else
            pnpm run typecheck --only
          fi
        shell: bash

  test:
    name: Tests
    timeout-minutes: 5
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          submodules: false
          fetch-depth: 0 # we need the full history to get the correct list of changed files

      - uses: ./.github/actions/setup/

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-output
          path: .

      - name: Run tests
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            pnpm run test --only --affected
          else
            pnpm run test --only
          fi
        shell: bash
        env:
          GITHUB_STEP_SUMMARY: /dev/null

  no-private-leak:
    name: No private leak
    timeout-minutes: 2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          submodules: false
          fetch-depth: 0 # setup action needs PR base SHA for turbo affected comparisons

      - uses: ./.github/actions/setup/

      - name: Check for private content on public branch
        run: pnpm run check:no-private-leak -- --mode workspace --visibility auto

  check:
    name: Repository checks
    timeout-minutes: 2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          submodules: false

      - uses: ./.github/actions/setup/

      - name: Run repository checks
        run: pnpm run check

  starters-e2e:
    name: Starters smoke
    timeout-minutes: 25
    runs-on: ubuntu-latest
    needs: [build, classify-ci]
    if: needs.classify-ci.outputs.starters_smoke == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          submodules: false
          fetch-depth: 0 # copy-out smoke path gate compares PR base/head SHAs

      - uses: ./.github/actions/setup/

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-output
          path: .

      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        shell: bash

      - name: Build starter dependencies
        run: pnpm turbo run build --filter=mapsight-host-starter --filter=mapsight-next-starter --filter=mapsight-vite-spa-starter
        shell: bash

      - name: Run starter smoke tests
        run: pnpm run test:starters:e2e
        shell: bash

      - name: Run copy-out starter smoke tests
        run: pnpm run test:starters:copy-out
        shell: bash

  lint-dependencies:
    name: Lint deps/pkg
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          submodules: false
          fetch-depth: 0 # we need the full history to get the correct list of changed files

      - uses: ./.github/actions/setup/

      - name: Check package.json format
        run: pnpm run syncpack:format:check

      - name: Lint dependencies
        run: pnpm run syncpack:lint

  zizmor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          submodules: false

      - name: Run zizmor 🌈
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          advanced-security: false

  check-changeset:
    name: Check changeset
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          submodules: false
          fetch-depth: 0 # we need the full history to get the correct list of changed files

      - uses: ./.github/actions/setup/

      - name: Check changeset
        run: pnpm changeset status --since=main

  ci-pass:
    name: CI status
    timeout-minutes: 2
    runs-on: ubuntu-latest
    needs:
      [
        classify-ci,
        build,
        lint,
        check-format,
        typecheck,
        check,
        test,
        starters-e2e,
        lint-dependencies,
        no-private-leak,
        zizmor,
        check-changeset,
      ]
    if: always()
    steps:
      - name: Check CI status
        run: |
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "❌ One or more CI checks failed or were cancelled"
            exit 1
          fi
          echo "✅ All CI checks passed or were skipped"

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [ci-pass]

    # Skip on pull requests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment: production

    permissions:
      contents: write
      pull-requests: write
      id-token: write # Required for OIDC
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: true
          submodules: false
          fetch-depth: 0 # we need the full history to get the correct list of changed files

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          registry-url: "https://registry.npmjs.org"
          cache: ""
          package-manager-cache: false
          check-latest: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        shell: bash

      - name: Create starter release artifacts
        run: |
          mkdir -p dist/starter-downloads
          for starter in mapsight-host-starter mapsight-next-starter mapsight-vite-spa-starter; do
            git archive \
              --format=zip \
              --prefix="$starter/" \
              --output="dist/starter-downloads/$starter.zip" \
              HEAD:"starters/$starter"
          done
        shell: bash

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: pnpm run version-packages
          publish: npm run release
          commitMode: "github-api"
        env:
          NPM_TOKEN: "" # We use OIDC, not a token

      - name: Upload starter release artifacts
        if: steps.changesets.outputs.published == 'true'
        run: |
          node <<'NODE' > "$RUNNER_TEMP/published-tags"
          const packages = JSON.parse(process.env.PUBLISHED_PACKAGES || "[]");
          for (const {name, version} of packages) {
            console.log(`${name}@${version}`);
          }
          NODE

          while IFS= read -r tag; do
            if [[ -z "$tag" ]]; then
              continue
            fi

            gh release upload "$tag" dist/starter-downloads/*.zip --clobber
          done < "$RUNNER_TEMP/published-tags"
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
