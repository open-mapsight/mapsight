version: 2

#registries:
#  npm-github:
#    type: npm-registry
#    url: https://npm.pkg.github.com
#    token: ${{secrets.GH_PKG_REGISTRY_TOKEN}}

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: wednesday
      time: "04:00"

    # Only accept updates that have been published for at least 7 days
    cooldown:
      default-days: 7

    # Create a grouped PR for minor/patch updates with majors getting dedicated PRs
    groups:
      actions:
        update-types:
          - patch
          - minor

    labels:
      - "deps:actions"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: wednesday
      time: "05:00"

    # Allow usage of any registry including npm-github w/ auth as above
    registries: "*"

    # Only accept updates that have been published for at least 7 days
    cooldown:
      default-days: 7

    # Ensure the new version is stored in `package.json`
    versioning-strategy: increase

    labels:
      - "deps:npm"

    groups:
      # Create dedicated (grouped) PRs for Next.js/tailwind dependencies
      next:
        patterns:
          - "next"
          - "@next/*"
          - "@vercel/*"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
      eslint:
        patterns:
          - "eslint"
          - "@eslint/*"
      react-router:
        patterns:
          - "react-router"
          - "react-router-dom"
      rtk:
        patterns:
          - "redux"
          - "redux-thunk"
          - "reselect"
          - "@reduxjs/toolkit"
          - "react-redux"
      imagemin:
        patterns:
          - "imagemin"
          - "imagemin-*"

      # Update `dependencies` and `devDependencies` separately
      # Create grouped PRs for minor/patch updates with majors getting dedicated PRs
      # Ignore the above groups/dependencies to avoid issues when Dependabot rebases
      production:
        dependency-type: production
        update-types:
          - patch
          - minor
        exclude-patterns:
          - "next"
          - "@next/*"
          - "@vercel/*"
          - "tailwindcss"
          - "@tailwindcss/*"
          - "react-router"
          - "react-router-dom"
          - "imagemin"
          - "imagemin-*"
          - "redux"
          - "redux-thunk"
          - "reselect"
          - "@reduxjs/toolkit"
          - "react-redux"
          - "eslint"
          - "@eslint/*"
      development:
        dependency-type: development
        update-types:
          - patch
          - minor
        exclude-patterns:
          - "next"
          - "@next/*"
          - "@vercel/*"
          - "tailwindcss"
          - "@tailwindcss/*"
          - "react-router"
          - "react-router-dom"
          - "imagemin"
          - "imagemin-*"
          - "redux"
          - "redux-thunk"
          - "reselect"
          - "@reduxjs/toolkit"
          - "react-redux"
          - "eslint"
          - "@eslint/*"

    # Manually update major versions of `@types/node` with the version specified within .nvmrc
    ignore:
      - dependency-name: "@types/node"
        update-types:
          - version-update:semver-major

    # Manually request rebases for each PR as we get to it
    # Avoids spamming Vercel with extra builds when there are lots of Dependabot PRs
    rebase-strategy: disabled

    # Allow enough PRs for all the groups plus some major version PRs
    open-pull-requests-limit: 20
