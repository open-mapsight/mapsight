minimumReleaseAge: 1440
packages:
  - "packages/*"
  - "apps/*"
  - "private/apps/*"
  - "private/packages/*"
  - "starters/*"
allowBuilds:
  '@parcel/watcher': true
  canvas: true
  esbuild: true
  fsevents: true
  unrs-resolver: true
  sharp: true
catalog:
  "@reduxjs/toolkit": "^2.11.2"
  "@playwright/test": "^1.60.0"
  "@types/jsdom": "^28.0.3"
  "canvas": "^3.1.0"
  "@types/lodash": "^4.17.24"
  "@types/node": "^24.13.2"
  "@types/react": "^19.2.15"
  "@types/react-dom": "^19.2.3"
  "@types/react-redux": "^7.1.34"
  "jsdom": "^29.1.1"
  "lodash": "^4.18.1"
  "ol": "^10.9.0"
  "pidusage": "^4.0.1"
  "playwright": "^1.60.0"
  "proj4": "^2.20.9"
  "react": "^19.2.7"
  "react-dom": "^19.2.7"
  "react-redux": "^9.3.0"
  "redux": "^5.0.1"
  "redux-batched-actions": "^0.5.0"
  "redux-thunk": "^3.1.0"
  "reselect": "^5.1.1"
  "tailwindcss": "^4.3.0"
  "typescript": "^6.0.3"
  "vitest": "^4.1.8"
  "zod": "^4.4.3"
minimumReleaseAgeExclude:
  - postcss@8.5.10
overrides:
  postcss@<8.5.10: ^8.5.10
  shell-quote@<1.8.4: ^1.8.4
  "@mapsight/core": "workspace:*"
  "@mapsight/lib-js": "workspace:*"
  "@mapsight/lib-ol": "workspace:*"
  "@mapsight/lib-redux": "workspace:*"
  "@mapsight/traffic-style": "workspace:*"
  "@mapsight/ui": "workspace:*"
  "@mapsight/vite-host-embed": "workspace:*"
  "@mapsight/vector-style-compiler": "workspace:*"
